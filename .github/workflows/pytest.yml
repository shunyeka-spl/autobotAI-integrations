name: Run Pytest

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
        
    - name: Install Steampipe
      run: |
        mkdir -p ~/.local/bin
        curl -fSL --retry 3 https://github.com/turbot/steampipe/releases/latest/download/steampipe_linux_amd64.tar.gz -o steampipe.tar.gz
        tar -xzf steampipe.tar.gz
        mv steampipe ~/.local/bin/
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        steampipe plugin install steampipe
    
    - name: Symlink steampipe to /usr/local/bin
      run: |
        sudo ln -s ~/.local/bin/steampipe /usr/local/bin/steampipe || sudo cp ~/.local/bin/steampipe /usr/local/bin/steampipe

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.14'
        # Pinned to latest stable. uv 0.5.29 had known segfault bugs
        # during `uv sync` with git-sourced deps on Ubuntu 24.04 (the
        # ``ubuntu-latest`` runner). See
        # https://github.com/astral-sh/uv/issues for fixes in 0.6.x/0.7.x.
        version: "0.7.13"
        # Cache uv's download + wheel cache across CI runs — makes
        # cold-cache installs of llama_index/boto3/~70 integration SDKs
        # dramatically faster and also avoids re-extracting wheels that
        # may trigger the old 0.5.x crash.
        enable-cache: true
        cache-dependency-glob: |
          uv.lock
          pyproject.toml

    - name: Install dependencies
      run: |
        uv sync --frozen --group test --python 3.14
        
    - name: Run specific tests
      run: |
        # Run only specific test files - modify this list as needed
        pytest --disable-warnings tests/test_handlers -v

    - name: Scan dependencies for vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: fs
        scan-ref: .
        scanners: vuln
#        trivy-config: trivy.yaml
        ignore-unfixed: true
        severity: CRITICAL,HIGH,MEDIUM,LOW
        exit-code: 1
